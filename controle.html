<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE MESTRE</title>
    <style>
        body { background: #000; color: #0F0; font-family: monospace; padding: 10px; }
        .monitor-card { 
            background: #111; border: 2px solid #0F0; border-radius: 12px; 
            padding: 15px; margin-bottom: 20px; box-shadow: 0 0 10px rgba(0,255,0,0.2);
        }
        input { width: 95%; padding: 10px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #0F0; }
        button { 
            width: 100%; padding: 15px; background: #0F0; color: #000; 
            font-weight: bold; border: none; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🎮 CONTROLE SARAH TV</h1>
    <div id="lista-monitores"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com"}).database();
        
        // Desenha um cartão para cada monitor conectado
        db.ref('monitores').on('value', (snap) => {
            const container = document.getElementById('lista-monitores');
            container.innerHTML = '';
            snap.forEach(m => {
                const id = m.key;
                container.innerHTML += `
                    <div class="monitor-card">
                        <h3>📺 ${id}</h3>
                        <input type="text" id="url_${id}" placeholder="Cole Link (YouTube ou MP4)">
                        <button onclick="enviar('${id}')">DISPARAR VÍDEO</button>
                    </div>`;
            });
        });

        function enviar(id) {
            const url = document.getElementById('url_' + id).value;
            if(!url) return;
            db.ref('monitores/' + id + '/comando').set('PLAY:' + url);
            alert("Enviado para " + id);
        }
    </script>
</body>
</html>
