<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1a1a1a; color: #00FF00; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .monitor-card { background: #000; border: 2px solid #00FF00; padding: 15px; margin-bottom: 20px; border-radius: 15px; }
        button { 
            width: 80%; padding: 20px; margin: 10px; 
            background: #222; color: #00FF00; border: 2px solid #00FF00;
            font-size: 1.2em; border-radius: 10px; font-weight: bold;
        }
        input { width: 90%; padding: 15px; margin: 10px 0; background: #333; color: #fff; border: 1px solid #555; }
    </style>
</head>
<body>
    <h2>🎮 CONTROLE SARAHTV</h2>
    <div id="lista-monitores"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com"}).database();
        
        db.ref('monitores').on('value', (snap) => {
            const container = document.getElementById('lista-monitores');
            container.innerHTML = '';
            snap.forEach(m => {
                const nome = m.key;
                container.innerHTML += `
                    <div class="monitor-card">
                        <h3>📺 ${nome.toUpperCase()}</h3>
                        <input type="text" id="url_${nome}" placeholder="Cole o link aqui...">
                        <br>
                        <button onclick="enviar('${nome}')">▶ PLAY</button>
                    </div>`;
            });
        });

        function enviar(nome) {
            const url = document.getElementById('url_' + nome).value;
            db.ref('monitores/' + nome + '/comando').set('PLAY:' + url);
            // Efeito visual no botão
            alert("Enviando para " + nome + "...");
        }
    </script>
</body>
</html>
