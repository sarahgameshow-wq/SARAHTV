<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE SARAHTV</title>
    <style>
        body { background: #000; color: #00FF00; font-family: monospace; padding: 20px; text-align: center; }
        input { width: 90%; padding: 15px; margin: 10px 0; background: #111; border: 2px solid #00FF00; color: #fff; font-size: 16px; }
        button { width: 95%; padding: 25px; margin: 20px 0; background: #004400; color: #00FF00; border: 2px solid #00FF00; font-size: 1.5em; font-weight: bold; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>COMANDO SARAHTV</h1>
    <input type="text" id="urlVideo" placeholder="Cole o Link do Vídeo Aqui">
    <button onclick="enviarComando()">DISPARAR NA TV</button>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com"}).database();
        
        function enviarComando() {
            const url = document.getElementById('urlVideo').value;
            db.ref('comando').set('PLAY:' + url);
            alert("Comando enviado com sucesso!");
        }
    </script>
</body>
</html>
