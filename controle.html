<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARAHTV PRO - CONTROLE</title>
    <style>
        body { background: #000; color: #0F0; font-family: monospace; margin: 0; }
        .tabs { display: flex; border-bottom: 2px solid #0F0; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; background: #111; }
        .tab.active { background: #0F0; color: #000; font-weight: bold; }
        .content { padding: 20px; display: none; }
        .content.active { display: block; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #111; color: #fff; border: 1px solid #0F0; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #0F0; color: #000; border: none; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" onclick="show('playlist')">PLAYLIST</div>
    <div class="tab" onclick="show('telas')">TELAS</div>
    <div class="tab" onclick="show('ajustes')">AJUSTES</div>
</div>

<div id="playlist" class="content active">
    <h3>FILA E DISPARO</h3>
    <input type="text" id="url" placeholder="Cole o link do YouTube...">
    
    <button onclick="adicionarEEnviar()" style="background:#0F0; color:#000;">
        🚀 ENVIAR PARA MONITOR
    </button>
    
    <button onclick="limpar()" style="background:#800; color:#fff; margin-top:10px;">
        🗑 LIMPAR TUDO
    </button>
</div>

<script>
    function adicionarEEnviar() {
        const url = document.getElementById('url').value;
        if(!url) return alert("Cole um link!");
        
        // 1. Adiciona na playlist (para manter o histórico)
        db.ref('monitores/Monitor_Padrao/playlist').push(url);
        
        // 2. Envia comando de PLAY imediato para o motor da TV
        db.ref('monitores/Monitor_Padrao/comando').set('PLAY:' + url);
        
        alert("Vídeo enviado com sucesso!");
        document.getElementById('url').value = ''; // Limpa o campo
    }
</script>
</body>
</html>
