<!DOCTYPE html>
<html>
<body style="background:#000; color:#0F0; padding:20px; font-family:sans-serif;">
    <input type="text" id="link" placeholder="Cole o link do YouTube" style="width:100%; padding:15px;">
    <button onclick="enviar()" style="width:100%; padding:20px; margin-top:10px; background:#0F0;">ADICIONAR VÍDEO</button>
    <button onclick="limpar()" style="width:100%; padding:20px; margin-top:10px; background:#800; color:#fff;">LIMPAR TUDO</button>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com"});
        const db = firebase.database();

        function enviar() {
            const url = document.getElementById('link').value;
            db.ref('fila').push(url);
            alert("Vídeo adicionado!");
        }
        function limpar() { db.ref('fila').remove(); location.reload(); }
    </script>
</body>
</html>
