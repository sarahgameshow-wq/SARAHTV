<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROLE SARAHTV</title>
    <style>
        body { background: #000; color: #0F0; font-family: monospace; padding: 20px; margin: 0; }
        h1 { text-align: center; border-bottom: 2px solid #0F0; padding-bottom: 10px; }
        .monitor-card { background: #111; border: 2px solid #0F0; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; color: #FFF; border: 1px solid #0F0; box-sizing: border-box; border-radius: 5px; }
        button { width: 100%; padding: 20px; background: #0F0; color: #000; font-weight: bold; font-size: 1.2em; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎮 CONTROLE</h1>
    <div id="lista"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com"}).database();
        
        db.ref('monitores').on('value', (snap) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            snap.forEach(m => {
                const id = m.key;
                lista.innerHTML += `
                    <div class="monitor-card">
                        <h2 style="margin:0;">📺 ${id}</h2>
                        <input type="text" id="url_${id}" placeholder="Link YouTube ou MP4">
                        <button onclick="enviar('${id}')">DISPARAR VÍDEO</button>
                    </div>`;
            });
        });

        function enviar(id) {
            const url = document.getElementById('url_' + id).value;
            if(!url) return alert("Cole o link!");
            db.ref('monitores/' + id + '/comando').set('PLAY:' + url);
        }
    </script>
</body>
</html>
