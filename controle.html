<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #1a1a1a; color: #00FF00; font-family: 'Courier New', monospace; text-align: center; }
        .tab-button { padding: 15px; margin: 5px; background: #003300; border: 1px solid #00FF00; color: #00FF00; cursor: pointer; }
        .container { border: 1px solid #00FF00; padding: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>SARAHTV PRO</h1>
    <button class="tab-button" onclick="mudarTab('TELAS')">TELAS</button>
    <button class="tab-button" onclick="mudarTab('PLAYLIST')">PLAYLIST</button>
    <button class="tab-button" onclick="mudarTab('AJUSTES')">AJUSTES</button>

    <div id="painel" class="container">
        <h3>Selecione uma opção</h3>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);

        function mudarTab(tab) {
            const painel = document.getElementById('painel');
            if(tab === 'PLAYLIST') {
                painel.innerHTML = `<h3>PLAYLIST</h3>
                                    <input type="text" id="linkVideo" placeholder="Link do YouTube">
                                    <button onclick="enviarLink()">ADICIONAR</button>`;
            } else {
                painel.innerHTML = `<h3>Modo ${tab}</h3><button onclick="enviar('PLAY')">ATIVAR MONITOR</button>`;
            }
        }

        function enviar(cmd) { firebase.database().ref('comando').set(cmd); }
        function enviarLink() { 
            const link = document.getElementById('linkVideo').value;
            firebase.database().ref('comando').set('PLAY:' + link); 
        }
    </script>
</body>
</html>
