<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE TÁTIL</title>
    <style>
        body { background: #0a0a0a; color: #39FF14; font-family: 'Courier New', monospace; padding: 20px; }
        input { width: 100%; padding: 15px; background: #000; color: #fff; border: 2px solid #39FF14; margin-bottom: 10px; }
        button { width: 100%; padding: 20px; background: #39FF14; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>CONTROLE TÁTIL DE OSASCO</h2>
    <input type="text" id="url" placeholder="Link do YouTube...">
    <button onclick="adicionar()">ADICIONAR À PLAYLIST</button>
    <button onclick="limpar()" style="background:#800; color:#fff; margin-top:10px;">LIMPAR FILA</button>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com"});
        const db = firebase.database();

        function adicionar() {
            const url = document.getElementById('url').value;
            db.ref('fila').push(url);
            alert("Vídeo na fila!");
        }
        function limpar() { db.ref('fila').remove(); alert("Fila limpa!"); }
    </script>
</body>
</html>
