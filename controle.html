<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE SARAHTV</title>
    <style>
        body { background: #111; color: #00FF00; font-family: monospace; padding: 20px; text-align: center; }
        input { width: 90%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #00FF00; color: #fff; }
        button { width: 90%; padding: 20px; margin: 10px 0; background: #004400; color: #00FF00; border: 1px solid #00FF00; font-size: 1.2em; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>CONTROLE SARAH GAMES</h1>
    <input type="text" id="urlVideo" placeholder="Link do YouTube ou MP4">
    <button onclick="enviar()">ENVIAR PARA A TV</button>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com"}).database();
        function enviar() {
            const url = document.getElementById('urlVideo').value;
            db.ref('comando').set('PLAY:' + url);
            alert("Enviado para a TV!");
        }
    </script>
</body>
</html>
