<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #1a1a1a; color: #00FF00; font-family: 'Courier New', monospace; text-align: center; }
        button { padding: 20px; margin: 10px; background: #003300; border: 1px solid #00FF00; color: #00FF00; cursor: pointer; width: 80%; }
    </style>
</head>
<body>
    <h1>SARAHTV PRO</h1>
    <input type="text" id="linkVideo" placeholder="ID ou Link do YouTube" style="width: 80%; padding: 10px;">
    <button onclick="enviar('PLAY:' + document.getElementById('linkVideo').value)">PLAY</button>
    <button onclick="enviar('ROTATE')" style="background: #330000; border-color: red; color: red;">VIRAR TELA</button>

    <script>
        const firebaseConfig = { databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        function enviar(cmd) { firebase.database().ref('comando').set(cmd); }
    </script>
</body>
</html>
