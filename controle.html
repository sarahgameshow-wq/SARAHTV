<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #121212; color: #0F0; font-family: sans-serif; padding: 15px; }
        h1 { text-align: center; color: #0F0; border-bottom: 2px solid #0F0; padding-bottom: 10px; }
        .monitor-card { background: #1c1c1c; border: 2px solid #333; padding: 20px; margin-bottom: 20px; border-radius: 15px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #0F0; border: 1px solid #0F0; box-sizing: border-box; }
        button { background: #0F0; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; font-size: 1.1em; border-radius: 8px; cursor: pointer; }
        .file-box { border-top: 1px solid #444; margin-top: 15px; padding-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>🎮 CONTROLE REMOTO</h1>
    <div id="lista"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com"}).database();
        
        db.ref('monitores').on('value', (snap) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            snap.forEach(m => {
                const id = m.key;
                lista.innerHTML += `
                    <div class="monitor-card">
                        <strong>📺 ${id}</strong>
                        <input type="text" id="url_${id}" placeholder="Cole link (YouTube ou MP4)">
                        <button onclick="enviar('${id}')">DISPARAR VÍDEO</button>
                        
                        <div class="file-box">
                            <label>Selecionar MP4 do PC:</label>
                            <input type="file" accept="video/mp4" onchange="uploadLocal('${id}', this)">
                        </div>
                    </div>`;
            });
        });

        function enviar(id) {
            const url = document.getElementById('url_' + id).value;
            if(!url) return alert("Cole um link primeiro!");
            db.ref('monitores/' + id + '/comando').set('PLAY:' + url);
        }

        function uploadLocal(id, input) {
            const file = input.files[0];
            if (file) {
                alert("Para rodar o " + file.name + " na TV, coloque-o em uma pasta pública ou link de rede. O sistema está pronto para receber!");
            }
        }
    </script>
</body>
</html>
