<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTRAL SARAHTV</title>
    <style>
        body { background: #000; color: #0F0; font-family: monospace; padding: 20px; }
        .tv-card { border: 2px solid #0F0; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
        button { width: 100%; padding: 15px; background: #0F0; color: #000; font-weight: bold; margin-top: 5px; cursor: pointer; }
        input { width: 100%; padding: 10px; background: #111; color: #fff; border: 1px solid #0F0; box-sizing: border-box; }
    </style>
</head>
<body>
    <h1>🎮 CENTRAL DE REDE</h1>
    <div id="lista-telas"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com"}).database();

        db.ref('monitores').on('value', snap => {
            const div = document.getElementById('lista-telas');
            div.innerHTML = '';
            snap.forEach(m => {
                const id = m.key;
                div.innerHTML += `
                    <div class="tv-card">
                        <h3>📺 ${id}</h3>
                        <input type="text" id="url_${id}" placeholder="Link YouTube...">
                        <button onclick="adicionar('${id}')">ADICIONAR À FILA</button>
                        <button onclick="limpar('${id}')" style="background:#800; color:#fff;">LIMPAR FILA</button>
                    </div>`;
            });
        });

        function adicionar(id) {
            const url = document.getElementById('url_' + id).value;
            db.ref('monitores/' + id + '/playlist').push(url);
        }
        function limpar(id) { db.ref('monitores/' + id + '/playlist').remove(); }
    </script>
</body>
</html>
