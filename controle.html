<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE DE PLAYLIST</title>
    <style>
        body { background: #000; color: #0F0; font-family: monospace; padding: 20px; }
        .monitor-box { background: #111; border: 2px solid #0F0; padding: 15px; margin-bottom: 20px; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #0F0; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #0F0; color: #000; font-weight: bold; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🎮 GESTOR DE FILA</h1>
    <div id="lista-monitores"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com"}).database();
        
        db.ref('monitores').on('value', (snap) => {
            const container = document.getElementById('lista-monitores');
            container.innerHTML = '';
            snap.forEach(m => {
                const id = m.key;
                container.innerHTML += `
                    <div class="monitor-box">
                        <h3>📺 ${id}</h3>
                        <input type="text" id="url_${id}" placeholder="Link YouTube">
                        <button onclick="adicionar('${id}')">ADICIONAR À FILA</button>
                        <button onclick="limpar('${id}')" style="background:#f00; margin-top:5px;">LIMPAR FILA</button>
                    </div>`;
            });
        });

        function adicionar(id) {
            const url = document.getElementById('url_' + id).value;
            // Empurra o link para uma lista no Firebase
            db.ref('monitores/' + id + '/playlist').push(url);
            alert("Vídeo adicionado à fila!");
        }

        function limpar(id) {
            db.ref('monitores/' + id + '/playlist').remove();
            alert("Fila limpa!");
        }
    </script>
</body>
</html>
