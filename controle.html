<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body style="background: #222; color: white; text-align: center; padding-top: 50px;">
    <h1>Controle Remoto</h1>
    <button style="padding: 20px; font-size: 20px;" onclick="enviar('PLAY')">PLAY</button>
    <button style="padding: 20px; font-size: 20px;" onclick="enviar('PROXIMA')">PRÓXIMA</button>

    <script>
        const firebaseConfig = { databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);

        function enviar(cmd) {
            firebase.database().ref('comando').set(cmd);
            alert("Enviado: " + cmd);
        }
    </script>
</body>
</html>
