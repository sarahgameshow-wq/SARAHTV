<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE SARAHTV</title>
    <style>
        body { background:#000; color:#0F0; font-family:monospace; padding:20px; }
        input { width:100%; padding:15px; margin:10px 0; background:#111; color:#fff; border:1px solid #0F0; box-sizing:border-box; }
        button { width:100%; padding:20px; background:#0F0; color:#000; font-weight:bold; border:none; margin-top:10px; }
    </style>
</head>
<body>
    <h1>CONTROLE: MONITOR PRINCIPAL</h1>
    <input type="text" id="url" placeholder="Link YouTube">
    <button onclick="add()">ADICIONAR À FILA</button>
    <button onclick="limpar()" style="background:#800; color:#fff;">LIMPAR FILA</button>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com"}).database();
        const path = 'monitores/Monitor_Principal/playlist';

        function add() {
            const val = document.getElementById('url').value;
            db.ref(path).push(val);
            document.getElementById('url').value = '';
        }
        function limpar() { db.ref(path).remove(); }
    </script>
</body>
</html>
