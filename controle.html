<!DOCTYPE html>
<html lang="pt-br">
<head>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; }
        .monitor-card { background: #222; padding: 15px; margin: 10px; border-radius: 10px; border: 1px solid #00FF00; }
    </style>
</head>
<body>
    <h1>CONTROLE MESTRE SARAH TV</h1>
    <div id="lista-monitores"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com"}).database();
        
        // Busca monitores ativos
        db.ref('monitores').on('value', (snap) => {
            const lista = document.getElementById('lista-monitores');
            lista.innerHTML = '';
            snap.forEach(m => {
                const nome = m.key;
                lista.innerHTML += `
                    <div class="monitor-card">
                        <h3>Monitor: ${nome}</h3>
                        <input type="text" id="url_${nome}" placeholder="Link YouTube/MP4">
                        <button onclick="enviar('${nome}')">ENVIAR</button>
                    </div>`;
            });
        });

        function enviar(nome) {
            const url = document.getElementById('url_' + nome).value;
            db.ref('monitores/' + nome + '/comando').set('PLAY:' + url);
        }
    </script>
</body>
</html>
