<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SARAHTV PRO - ESTAÇÃO</title>
    <style>
        body { 
            margin: 0; height: 100vh; overflow: hidden;
            background: #050505; /* Fundo escuro */
            display: flex; align-items: center; justify-content: center; gap: 40px;
        }

        /* CELULAR DE MONITORAMENTO */
        #celular-tempo { 
            width: 200px; height: 380px; background: #111; 
            border-radius: 30px; border: 4px solid #00FF00; 
            color: #00FF00; padding: 20px; font-family: monospace;
            display: flex; flex-direction: column; align-items: center;
        }

        /* NOTEBOOK (INTERFACE) */
        #notebook {
            width: 60vw; height: 35vw; /* Proporção ideal de notebook */
            background: #000; border: 12px solid #333;
            border-radius: 15px 15px 5px 5px;
            overflow: hidden; position: relative;
        }

        /* TELA CHEIA (VIDEO) */
        #root { width: 100%; height: 100%; }
        iframe, video { 
            width: 100% !important; height: 100% !important; 
            border: none !important; object-fit: cover !important; 
        }

        /* RODAPÉ FIXO */
        #rodape { 
            position: fixed; bottom: 0; width: 100%; height: 40px; 
            background: #FFD700; color: #000; font-weight: bold; 
            display: flex; align-items: center; padding-left: 20px; font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="celular-tempo">
        <h3>TEMPO</h3>
        <p>21°C - Nublado</p>
        <p style="font-size: 12px;">CARAPICUÍBA - SP</p>
    </div>

    <div id="notebook">
        <div id="root">AGUARDANDO...</div>
    </div>

    <div id="rodape">
        <marquee>SISTEMA SARAHTV ONLINE >> SARAH GAMES: RUA ZUMBI DOS PALMARES, 25 - OSASCO</marquee>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
