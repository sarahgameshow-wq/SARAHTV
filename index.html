<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SARAHTV - Vitrine</title>
    <style>
        body { 
            background: #000; color: #00FF00; font-family: 'Courier New', monospace; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        /* Cabeçalho com Relógio Grande e Sinal */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 40px; border-bottom: 2px solid #00FF00; 
        }
        #sinal { font-size: 1.5em; text-transform: uppercase; font-weight: bold; }
        #relogio { font-size: 3em; border: 3px solid #00FF00; padding: 5px 20px; border-radius: 5px; font-weight: bold; }
        
        /* Container Principal da Tela de Vídeo */
        #root { 
            flex-grow: 1; display: flex; align-items: center; justify-content: center; 
            border: 5px solid #00FF00; border-radius: 10px; margin: 30px; 
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.4); overflow: hidden; 
        }
        
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <header>
        <div id="sinal">📡 SINAL ATIVO: TRANSMISSÃO AO VIVO</div>
        <div id="relogio">16:19:53</div>
    </header>
    
    <div id="root">
        AGUARDANDO...
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
    
    <script>
        // Função do Relógio em Tempo Real
        function atualizarRelogio() {
            const relogioElemento = document.getElementById('relogio');
            const agora = new Date();
            relogioElemento.innerText = agora.toLocaleTimeString();
        }
        setInterval(atualizarRelogio, 1000);
    </script>
</body>
</html>
