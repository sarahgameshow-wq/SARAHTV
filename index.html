<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        /* CSS NEON DE ESTÚDIO */
        body { 
            margin: 0; 
            background: #000; 
            color: #39FF14; 
            font-family: 'Courier New', monospace; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        header { 
            padding: 20px; 
            background: #0a0a0a;
            border-bottom: 3px solid #39FF14; 
            text-align: center; 
            font-weight: bold; 
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 4px;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        #main-container { 
            display: flex; 
            flex-grow: 1; 
            padding: 20px;
            gap: 20px;
        }

        #video-container { 
            flex-grow: 1; 
            border: 4px solid #39FF14; 
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.3);
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #side-panel { 
            width: 300px; 
            background: #0a0a0a;
            border: 2px solid #39FF14; 
            padding: 20px;
            box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.1);
        }

        #rodape { 
            height: 50px; 
            background: #39FF14; 
            color: #000; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 18px;
            text-transform: uppercase;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <header>SARAHTV PRO - ESTAÇÃO DE MONITORAMENTO ZUMBI DOS PALMARES</header>
    
    <div id="main-container">
        <div id="video-container">AGUARDANDO SINAL...</div>
        <div id="side-panel">
            <h3 style="text-decoration: underline;">STATUS:</h3>
            <p id="monitor-id">Carregando...</p>
            <div style="margin-top: 50px; font-size: 12px; color: #555;">
                SINAL OPERACIONAL: ATIVO<br>
                OSASCO - SP
            </div>
        </div>
    </div>
    
    <div id="rodape">SISTEMA ONLINE - SARAHTV PRO</div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com"});
        const db = firebase.database();
        const id = "Monitor_Principal";
        document.getElementById('monitor-id').innerText = id;

        db.ref('fila').on('value', (snap) => {
            let lista = [];
            snap.forEach(c => lista.push(c.val()));
            if(lista.length > 0) tocar(lista);
        });

        function tocar(lista, i = 0) {
            const vId = lista[i].split('v=')[1]?.split('&')[0] || lista[i].split('/').pop();
            document.getElementById('video-container').innerHTML = `<iframe src="https://www.youtube.com/embed/${vId}?autoplay=1&controls=0" allow="autoplay"></iframe>`;
            setTimeout(() => tocar(lista, (i + 1) % lista.length), 60000);
        }
    </script>
</body>
</html>
