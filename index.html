<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SARAHTV PRO</title>
    <style>
        body { margin: 0; height: 100vh; background: #050505; display: flex; justify-content: center; align-items: center; }
        
        #sala-de-controle { display: flex; flex-direction: row; align-items: center; gap: 30px; }

        /* CELULAR EM PÉ (VERTICAL) AO LADO */
        #celular-tempo { 
            width: 250px; height: 450px; background: #000; 
            border-radius: 40px; border: 5px solid #333; 
            color: #00FF00; padding: 20px; font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* TV GRANDE (70% da largura) */
        #container-principal { 
            width: 70vw; height: 60vh; 
            border: 4px solid #00FF00; background: #000; 
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.2);
            display: flex; flex-direction: column;
        }

        #root { flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        #rodape-noticias { position: fixed; bottom: 0; width: 100%; height: 40px; background: #FFD700; color: black; font-weight: bold; display: flex; align-items: center; padding-left: 20px; font-size: 18px; }
    </style>
</head>
<body>

    <div id="sala-de-controle">
        <div id="celular-tempo">
            <h3>CARAPICUÍBA</h3>
            <p>21°C - Nublado</p>
        </div>

        <div id="container-principal">
            <div id="root">AGUARDANDO...</div>
        </div>
    </div>

    <div id="rodape-noticias"><marquee>SISTEMA SARAHTV ONLINE >> TRANSMISSÃO AO VIVO</marquee></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
