<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SARAHTV PRO</title>
    <style>
        body { background: #0c0c0c; color: #00FF00; font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Layout principal estilo "Painel de Transmissão" */
        #container-principal { 
            width: 90%; height: 85vh; 
            border: 2px solid #00FF00; 
            display: flex; flex-direction: column;
            padding: 20px; box-sizing: border-box;
            background: #000;
        }

        /* Barra de Título e Relógio */
        header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 1.2em; border-bottom: 1px solid #00FF00; padding-bottom: 5px; }

        /* Área do Vídeo */
        #root { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="container-principal">
        <header>
            <div>SINAL ATIVO: MONITOR PRINCIPAL - TERMINAL</div>
            <div id="relogio">00:00:00</div>
        </header>
        
        <div id="root">
            <div id="monitor">AGUARDANDO SINAL...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
