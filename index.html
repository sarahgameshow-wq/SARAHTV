<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SARAHTV PRO - ESTAÇÃO</title>
    <style>
       body {
    /* Novo Fundo: Imagem de Estúdio Técnico */
    background: url('https://image.spreadshirtmedia.net/image-server/v1/mp/products/T1457A1MPA4459PT10X14Y18D196328631W2661H3105/views/1,width=1200,height=1200,appearanceId=1,backgroundColor=F2F2F2/monitoring-studio-technical-support-desk-tech-poster-postercard.jpg') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    flex-direction: column;
    align-items: center; /* Centraliza horizontalmente */
    justify-content: center; /* Centraliza verticalmente */
}

#wrapper-notebook {
    /* Centraliza o notebook */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

#notebook-container {
    /* Mantém o tamanho e moldura */
    width: 70vw; /* Ajuste para equilibrar */
    height: 55vh;
}

#notebook-base {
    /* Base do teclado */
    width: 80vw;
}

/* Celular Flutuante (Reposicionado) */
#celular-tempo {
    position: absolute;
    top: 50px; /* Distância do topo */
    left: 10vw; /* Flutua à esquerda */
    z-index: 10; /* Fica sobre o fundo */
    width: 200px; height: 380px;
    background: rgba(15, 15, 15, 0.9); /* Vidro fosco */
    border: 2px solid #00FF00;
}

        #root { width: 100%; height: 100%; }
        
        /* CORREÇÃO DO VÍDEO PARA PREENCHER TUDO */
        iframe, video { 
            width: 100% !important; height: 100% !important; 
            border: none !important; object-fit: cover !important; 
        }

        /* RODAPÉ */
        #rodape { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 40px; 
            background: #FFD700; color: #000; font-weight: bold; 
            display: flex; align-items: center; padding-left: 20px;
        }
    </style>
</head>
<body>

    <div id="celular-tempo">
        <h3>TEMPO</h3>
        <p>21°C - Nublado</p>
        <p>CARAPICUÍBA - SP</p>
    </div>

    <div id="notebook">
        <div id="root">AGUARDANDO...</div>
    </div>

    <div id="rodape">
        <marquee>SISTEMA SARAHTV ONLINE >> SARAH GAMES: RUA ZUMBI DOS PALMARES, 25 - OSASCO</marquee>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
