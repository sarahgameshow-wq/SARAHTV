<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background: #000;
            display: flex; align-items: center; justify-content: center;
        }

        /* Fundo Imersivo (O Estúdio) */
        #fundo-estudio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://image.spreadshirtmedia.net/image-server/v1/mp/products/T1457A1MPA4459PT10X14Y18D196328631W2661H3105/views/1,width=1200,height=1200,appearanceId=1,backgroundColor=F2F2F2/monitoring-studio-technical-support-desk-tech-poster-postercard.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        /* O Notebook Central */
        #notebook-container {
            position: relative; z-index: 2;
            width: 60vw; height: 40vh;
            background: #000; border: 10px solid #222;
            border-radius: 15px 15px 5px 5px;
            overflow: hidden;
        }

        #root { width: 100%; height: 100%; }
        iframe, video { 
            width: 100% !important; height: 100% !important; 
            border: none !important; object-fit: fill !important; 
        }

        /* O Celular de Tempo (Fixo à Esquerda) */
        #celular-tempo { 
            position: absolute; top: 15%; left: 10%; z-index: 3;
            width: 180px; height: 320px; 
            background: rgba(0,0,0,0.85); border: 2px solid #00FF00;
            color: #00FF00; padding: 20px; font-family: monospace;
            border-radius: 25px; display: flex; flex-direction: column; align-items: center;
        }

        /* Rodapé de Notícias */
        #rodape-noticias { 
            position: fixed; bottom: 0; width: 100%; height: 50px; z-index: 4;
            background: rgba(255, 215, 0, 0.95); color: black; font-weight: bold;
            display: flex; align-items: center; font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="fundo-estudio"></div>

    <div id="celular-tempo">
        <h3>TEMPO</h3>
        <p style="font-size: 2em;">21°C</p>
        <p>CARAPICUÍBA - SP</p>
    </div>

    <div id="notebook-container">
        <div id="root">AGUARDANDO...</div>
    </div>

    <div id="rodape-noticias">
        <marquee>SISTEMA SARAHTV ONLINE >> TRANSMISSÃO AO VIVO >> SARAH GAMES: RUA ZUMBI DOS PALMARES, 25 - OSASCO</marquee>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
