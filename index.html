<!DOCTYPE html>
<html>
<head>
    <title>SARAHTV - MONITOR</title>
    <style>
        body { margin:0; background:#000; overflow:hidden; }
        #root { width:100vw; height:100vh; }
        iframe { width:100%; height:100%; border:none; }
    </style>
</head>
<body>
    <div id="root">AGUARDANDO...</div>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({databaseURL: "https://sarahtv-19938-default-rtdb.firebaseio.com"});
        const monitorID = "Monitor_Principal"; // ID Fixo para a TV Única
        const db = firebase.database();
        
        db.ref('monitores/' + monitorID + '/playlist').on('value', (snap) => {
            const list = [];
            snap.forEach(c => list.push(c.val()));
            if(list.length > 0) tocar(list);
        });

        function tocar(list) {
            let i = 0;
            function next() {
                if(i >= list.length) i = 0;
                const v = list[i].split('v=')[1]?.split('&')[0] || list[i].split('/').pop();
                document.getElementById('root').innerHTML = `<iframe src="https://www.youtube.com/embed/${v}?autoplay=1&controls=0&modestbranding=1" style="width:100%;height:100%;border:none;"></iframe>`;
                setTimeout(next, 60000); // 60s por vídeo
                i++;
            }
            next();
        }
    </script>
</body>
</html>
