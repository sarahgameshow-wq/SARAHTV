<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SARAHTV PRO - ESTAÇÃO</title>
    <style>
        <div id="relogio-estudio" style="position: absolute; top: 20px; right: 20px; color: #00FF00; font-family: monospace; font-size: 2em; background: rgba(0,0,0,0.5); padding: 10px; border: 1px solid #00FF00; border-radius: 5px;">00:00:00</div>

    <script>
        setInterval(() => {
            document.getElementById('relogio-estudio').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
        body { 
            margin: 0; height: 100vh; overflow: hidden;
            background: #050505; /* Fundo escuro */
            display: flex; align-items: center; justify-content: center; gap: 40px;
        }

      /* Notebook com efeito de luz ambiente */
        #notebook {
            width: 60vw; height: 35vw;
            background: #000; 
            border: 12px solid #222;
            border-radius: 15px 15px 5px 5px;
            overflow: hidden; 
            position: relative;
            /* O toque final: um brilho suave que simula luz de estúdio */
            box-shadow: 0 0 60px rgba(0, 255, 0, 0.2), 0 0 20px rgba(0,0,0,0.5);
        }

        /* Celular com vidro fosco */
        #celular-tempo { 
            width: 200px; height: 380px; 
            background: rgba(15, 15, 15, 0.9); 
            border-radius: 30px; 
            border: 2px solid #00FF00; 
            color: #00FF00; padding: 20px; 
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }

        /* TELA CHEIA (VIDEO) */
        #root { width: 100%; height: 100%; }
        iframe, video { 
            width: 100% !important; height: 100% !important; 
            border: none !important; object-fit: cover !important; 
        }

        /* RODAPÉ FIXO */
        #rodape { 
            position: fixed; bottom: 0; width: 100%; height: 40px; 
            background: #FFD700; color: #000; font-weight: bold; 
            display: flex; align-items: center; padding-left: 20px; font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="celular-tempo">
        <h3>TEMPO</h3>
        <p>21°C - Nublado</p>
        <p style="font-size: 12px;">CARAPICUÍBA - SP</p>
    </div>

    <div id="notebook">
        <div id="root">AGUARDANDO...</div>
    </div>

    <div id="rodape">
        <marquee>SISTEMA SARAHTV ONLINE >> SARAH GAMES: RUA ZUMBI DOS PALMARES, 25 - OSASCO</marquee>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
