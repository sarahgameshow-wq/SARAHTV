<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; height: 100vh; width: 100vw; overflow: hidden;
            background: #1a1a1a; /* Fundo escuro profissional */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* O Notebook */
        #notebook-container {
            width: 80vw; height: 50vh;
            background: #000;
            border: 15px solid #333; /* Moldura do notebook */
            border-top: 20px solid #333;
            border-radius: 15px;
            display: flex; position: relative;
        }

      /* Garante que o container ocupe todo o espaço da moldura */
        #root { 
            width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center;
        }

        /* O SEGREDO ESTÁ AQUI: cover e overflow hidden */
        iframe, video { 
            width: 100% !important; 
            height: 100% !important; 
            border: none !important; 
            object-fit: cover !important; /* Estica para cobrir tudo */
        }
        /* A base (teclado) */
        #notebook-base {
            width: 85vw; height: 50px;
            background: #333;
            border-radius: 0 0 20px 20px;
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-family: sans-serif; font-weight: bold;
        }

        #rodape-noticias { 
            position: fixed; bottom: 0; width: 100%; height: 40px; 
            background: #FFD700; color: black; font-weight: bold; 
            display: flex; align-items: center; padding-left: 20px;
        }
    </style>
</head>
<body>

    <div id="notebook-container">
        <div id="root">AGUARDANDO...</div>
    </div>
    <div id="notebook-base">SARAH GAMES - MANUTENÇÃO E LAN HOUSE</div>

    <div id="rodape-noticias">
        <marquee>SISTEMA SARAHTV ONLINE >> TRANSMISSÃO AO VIVO >> SARAH GAMES - RUA ZUMBI DOS PALMARES, 25 - OSASCO</marquee>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
