<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SARAHTV PRO</title>
    <style>
        /* Força a imagem de fundo ocupar 100% da tela sempre */
        body { 
            margin: 0; height: 100vh; width: 100vw;
            background: url('https://images.unsplash.com/photo-1593642532744-d377ab507dc8?q=80&w=2000') no-repeat center center fixed; 
            background-size: cover !important; 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        
        #palco-geral { display: flex; align-items: center; gap: 30px; height: 80vh; width: 90vw; }

        #celular-tempo { width: 220px; height: 400px; background: rgba(0,0,0,0.8); border-radius: 30px; border: 3px solid #00FF00; color: #00FF00; padding: 20px; font-family: monospace; display: flex; flex-direction: column; justify-content: center; }

        /* A MOLDURA DA TV */
        #container-principal { 
            width: 70vw; height: 55vh; 
            border: 8px solid #00FF00; 
            background: #000; 
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.1); 
            border-radius: 8px;
            display: flex; flex-direction: column; padding: 0; overflow: hidden;
        }
        
        /* O CONTAINER DO VIDEO */
        #root { width: 100%; height: 100%; display: flex; }
        
        /* FORÇA O VIDEO A COBRIR 100% DA MOLDURA */
        iframe, video { 
            width: 100% !important; height: 100% !important; 
            border: none !important; object-fit: fill !important; 
        }
        
        #rodape-noticias { position: fixed; bottom: 0; width: 100%; height: 40px; background: rgba(255, 215, 0, 0.9); color: black; font-weight: bold; display: flex; align-items: center; padding-left: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <div id="palco-geral">
        <div id="celular-tempo">
            <h3>CARAPICUÍBA</h3>
            <p>21°C - Nublado</p>
        </div>
        <div id="container-principal">
            <div id="root">AGUARDANDO...</div>
        </div>
    </div>
    <div id="rodape-noticias"><marquee>SISTEMA SARAHTV ONLINE >> TRANSMISSÃO AO VIVO</marquee></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
