<!DOCTYPE html>
<html lang="pt-br">
<head>
   <style>
    body { 
        margin: 0; 
        background: #000; 
        color: #39FF14; 
        font-family: 'Courier New', monospace; 
        height: 100vh; 
        display: flex; 
        flex-direction: column; 
    }
    
    /* Cabeçalho como na imagem */
    header { 
        padding: 15px; 
        border-bottom: 3px solid #39FF14; 
        text-align: center; 
        font-weight: bold; 
        font-size: 20px;
        letter-spacing: 2px;
    }

    /* Container Principal */
    #main-container { 
        display: flex; 
        flex-grow: 1; 
        padding: 10px;
    }

    /* Área do Vídeo com moldura */
    #video-container { 
        flex-grow: 1; 
        border: 4px solid #39FF14; 
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Painel Lateral Status */
    #side-panel { 
        width: 350px; 
        padding: 30px; 
        border-left: 3px solid #39FF14; 
        background: #0a0a0a;
    }

    /* Rodapé fixo */
    #rodape { 
        height: 50px; 
        background: #39FF14; 
        color: #000; 
        font-weight: bold; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        font-size: 18px;
    }
</style>
</body>
</html>
