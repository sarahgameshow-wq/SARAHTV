<!DOCTYPE html>
<html lang="pt-br">
<head>
    <style>
        body { 
            margin: 0; height: 100vh; overflow: hidden;
            background: url('https://i.imgur.com/seu-fundo-sala.jpg') center/cover; /* Substitua pelo seu link de fundo */
            display: flex; justify-content: center; align-items: center;
        }
        
        /* Contêiner Geral */
        #sala-de-controle { display: flex; align-items: center; gap: 40px; }

        /* O Celular (Previsão do Tempo) */
        #celular-tempo { width: 200px; height: 400px; background: #111; border-radius: 30px; border: 5px solid #333; color: white; padding: 20px; font-family: sans-serif; }

        /* A TV (Sua tela atual) */
        #container-principal { width: 700px; height: 400px; border: 4px solid #00FF00; background: #000; display: flex; flex-direction: column; }

        /* Barra de Notícias (Rodapé) */
        #rodape-noticias { 
            position: fixed; bottom: 0; width: 100%; height: 50px; 
            background: #FFD700; color: black; font-weight: bold; 
            display: flex; align-items: center; padding-left: 20px; font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="sala-de-controle">
        <div id="celular-tempo">
            <h3>TEMPO</h3>
            <p>17°C - Nublado</p>
        </div>

        <div id="container-principal">
            <header style="color:#00FF00; padding:5px;">SINAL ATIVO: MONITOR</header>
            <div id="root">Aguardando...</div>
        </div>
    </div>

    <div id="rodape-noticias">
        <marquee>>> ÚLTIMAS NOTÍCIAS: FUTEBOL OSASCO EM CAMPO! >> SISTEMA ONLINE >> PREVISÃO DE CHUVA PARA A REGIÃO >> </marquee>
    </div>

    <script src="script.js"></script>
</body>
</html>
