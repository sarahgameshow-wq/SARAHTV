<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; height: 100vh; background: #050505; display: flex; justify-content: center; align-items: center; }
        
        #sala-de-controle { display: flex; flex-direction: column; align-items: center; gap: 20px; }

        /* CELULAR HORIZONTAL (Info Box) */
        #celular-tempo { 
            width: 400px; height: 200px; background: #000; 
            border-radius: 20px; border: 3px solid #333; 
            color: #00FF00; padding: 15px; font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* TV LED GRANDE */
        #container-principal { 
            width: 85vw; height: 60vh; /* Ocupa 85% da largura da tela */
            border: 4px solid #00FF00; background: #000; 
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
            display: flex; flex-direction: column;
        }

        #root { flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        #rodape-noticias { position: fixed; bottom: 0; width: 100%; height: 40px; background: #FFD700; color: black; font-weight: bold; display: flex; align-items: center; padding-left: 20px; font-size: 18px; }
    </style>
</head>
<body>

    <div id="sala-de-controle">
        <div id="celular-tempo">
            <h3>CARAPICUÍBA: 21°C</h3>
            <p>NOBLADO</p>
        </div>

        <div id="container-principal">
            <div id="root">AGUARDANDO...</div>
        </div>
    </div>

    <div id="rodape-noticias"><marquee>SISTEMA SARAHTV ONLINE >> AGUARDANDO COMANDO...</marquee></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
