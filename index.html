<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #00FF00; font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Relógio estilo terminal */
        #relogio { position: absolute; top: 20px; right: 20px; border: 2px solid #00FF00; padding: 10px; font-size: 1.5em; background: rgba(0, 50, 0, 0.5); }
        
        /* Moldura do Monitor */
        #monitor { border: 4px solid #00FF00; padding: 30px; width: 70%; text-align: center; box-shadow: 0 0 15px #00FF00; background: rgba(0, 20, 0, 0.8); }
        
        /* Área de Conteúdo */
        #root { font-size: 2em; margin-top: 20px; }
        
        /* Estilo da mensagem de sinal */
        .sinal { color: #fff; text-transform: uppercase; letter-spacing: 2px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>
    <div id="relogio">00:00:00</div>
    <div id="monitor">
        <h2 style="border-bottom: 2px solid #00FF00;">SINAL DO RETRANSMISSOR</h2>
        <div id="root">Aguardando comando...</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
iframe {
    object-fit: cover;
}
