<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SARAHTV - Pq. Palmares</title>
    <style>
        body { margin: 0; padding: 0; height: 100vh; background: #000; overflow: hidden; display: flex; flex-direction: column; }

        /* VÍDEO NO CENTRO (FULLSCREEN) */
        #root { flex-grow: 1; width: 100%; position: relative; background: #000; }
        iframe, video { width: 100% !important; height: 100% !important; border: none !important; object-fit: fill !important; }

        /* PAINEL ESQUERDO: ÔNIBUS */
        #painel-onibus { 
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.85); border: 2px solid #00FFFF;
            color: #00FFFF; padding: 15px; border-radius: 10px;
            font-family: monospace; width: 220px; font-weight: bold;
        }

        /* PAINEL DIREITO: RELÓGIO E TEMPO */
        #painel-direito { 
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.85); border: 2px solid #00FF00;
            color: #00FF00; padding: 15px; border-radius: 10px;
            font-family: monospace; text-align: right; width: 200px;
        }

        /* RODAPÉ */
        #rodape { height: 50px; background: #FFD700; color: #000; font-weight: bold; display: flex; align-items: center; font-size: 20px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="painel-onibus">
        <h3 style="margin-top:0;">🚌 LINHAS Pq. PALMARES</h3>
        <p>➤ 035 - Terminal Osasco</p>
        <p>➤ 034 - Centro Osasco</p>
        <p>➤ 466EX1 - Pinheiros</p>
    </div>

    <div id="painel-direito">
        <div id="relogio" style="font-size: 1.8em; font-weight: bold;">00:00:00</div>
        <div style="font-size: 1.2em;">21°C - Nublado</div>
        <div style="font-size: 0.9em;">Pq. Palmares, Osasco</div>
    </div>

    <div id="root">AGUARDANDO...</div>

    <div id="rodape">
        <marquee>SARAHTV ONLINE >> TRANSMISSÃO AO VIVO >> SARAH GAMES - RUA ZUMBI DOS PALMARES, 25 - PQ PALMARES - OSASCO</marquee>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
    <script>
        setInterval(() => document.getElementById('relogio').innerText = new Date().toLocaleTimeString(), 1000);
    </script>
</body>
</html>
